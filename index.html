<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Set theme before first paint (no flash). Stored choice wins,
      // otherwise default to dark (the "serious AI systems" first impression).
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t !== "light") document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0A0A0B" />

    <title>Harshith, AI Engineer | Reliable AI Systems & Pipelines</title>
    <meta
      name="description"
      content="I build AI systems that turn manual work into reliable automation. LLM integration, multi-modal pipelines, and structured-output engineering that holds up in production."
    />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Harshith, AI Engineer" />
    <meta
      property="og:description"
      content="I build AI systems that turn manual work into reliable automation. LLM pipelines, multi-modal apps, and structured-output engineering."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:title" content="Harshith, AI Engineer" />
    <meta
      name="twitter:description"
      content="AI systems that turn manual work into reliable automation."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
